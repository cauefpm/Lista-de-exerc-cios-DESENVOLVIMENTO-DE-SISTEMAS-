<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4">
        <a href="../index.html" class="btn btn-outline-secondary mb-3">Voltar</a>
        <h1 class="h3 mb-3">Atividade 10 - Cartao de apresentacao</h1>
        <input id="nome" type="text" class="form-control mb-2" placeholder="Nome">
        <input id="idade" type="number" class="form-control mb-2" placeholder="Idade">
        <input id="profissao" type="text" class="form-control mb-2" placeholder="Profissao">
        <textarea id="descricao" class="form-control mb-2" placeholder="Descricao"></textarea>
        <button id="botao" type="button" class="btn btn-primary">Gerar cartao</button>
        <div id="cartao" class="border rounded p-3 mt-3">O cartao aparecera aqui.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
