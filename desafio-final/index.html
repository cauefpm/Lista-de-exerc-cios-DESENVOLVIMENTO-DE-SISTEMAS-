<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html">Voltar</a>
    <h1>Desafio Final - Painel de Personalizacao</h1>

    <label>Cor de fundo</label>
    <input id="fundo" type="color" value="#ffffff">

    <label>Cor do texto</label>
    <input id="texto" type="color" value="#000000">

    <label>Tamanho da fonte</label>
    <input id="fonte" type="range" min="12" max="40" value="20">

    <label>Arredondamento das bordas</label>
    <input id="raio" type="range" min="0" max="40" value="8">

    <label>Largura</label>
    <input id="largura" type="range" min="200" max="600" value="350">

    <label>Altura</label>
    <input id="altura" type="range" min="120" max="350" value="180">

    <div>
        <input id="tema" type="checkbox">
        <label for="tema">Tema escuro</label>
    </div>

    <div id="cartao" class="cartao">
        <h3>Cartao personalizado</h3>
        <p>Desenvolvimento de Sistemas</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
