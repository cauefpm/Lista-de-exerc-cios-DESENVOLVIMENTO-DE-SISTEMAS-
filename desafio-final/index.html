<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4">
        <a href="../index.html" class="btn btn-outline-secondary mb-3">Voltar</a>
        <h1 class="h3 mb-3">Desafio Final - Painel de Personalizacao</h1>

        <label class="form-label">Cor de fundo</label>
        <input id="fundo" type="color" class="form-control form-control-color mb-2" value="#ffffff">

        <label class="form-label">Cor do texto</label>
        <input id="texto" type="color" class="form-control form-control-color mb-2" value="#000000">

        <label class="form-label">Tamanho da fonte</label>
        <input id="fonte" type="range" class="form-range" min="12" max="40" value="20">

        <label class="form-label">Arredondamento das bordas</label>
        <input id="raio" type="range" class="form-range" min="0" max="40" value="8">

        <label class="form-label">Largura</label>
        <input id="largura" type="range" class="form-range" min="200" max="600" value="350">

        <label class="form-label">Altura</label>
        <input id="altura" type="range" class="form-range" min="120" max="350" value="180">

        <div class="form-check mb-3">
            <input id="tema" class="form-check-input" type="checkbox">
            <label class="form-check-label" for="tema">Tema escuro</label>
        </div>

        <div id="cartao" class="cartao p-3">
            <h3>Cartao personalizado</h3>
            <p>Desenvolvimento de Sistemas</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
